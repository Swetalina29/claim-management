<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>Submit a claim</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>

	<nav class="navbar">
	    <div class="navbar-brand">📋 Claim Management</div>
	    <div class="navbar-links">
	      <a href="index.html" class="nav-link active">Client Portal</a>
	      <a href="admin.html" class="nav-link">Admin Panel</a>
	    </div>
  	</nav>
  
	<div class="container">
        <h1>📋 Claim Management System</h1>
        <p class="subtitle">Fill in the details below to submit your claim</p>

        <div class="card">
            <h2>Submit New Claim</h2>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="claimantName" placeholder="Enter your full name">
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="your@email.com">
            </div>

            <div class="form-group">
                <label>Claim Type</label>
                <select id="claimType">
                    <option value="">-- Select Type --</option>
                    <option value="Insurance">Insurance</option>
                    <option value="Medical">Medical</option>
                    <option value="Vehicle">vehicle</option>
                    <option value="Property">Property</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Claim Amount (₹)</label>
                <input type="number" id="amount" placeholder="Enter amount">
            </div>
            
            <div class="form-group">
                <label>Description</label>
                <textarea id="description" rows="4" placeholder="Describe your claim..."></textarea>
            </div>

            <button class="btn btn-primary" onclick="submitClaim()">Submit Claim</button>

            <div id="message" class="message"></div>
        </div>
        
        <div class="card">
            <h2>Track Your Claim</h2>
            <div class="form-group">
                <label>Enter Claim ID</label>
                <input type="number" id="trackId" placeholder="e.g., 1">
            </div>
            <button class="btn btn-secondary" onclick="trackClaim()">Track Status</button>
            <div id="trackResult"></div>
        </div>
    </div>
    

    <script src="index.js"></script>
           
            
</body>
</html>
