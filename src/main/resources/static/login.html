<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">📋 Claim Management</div>
        <div class="navbar-links">
            <a href="index.html" class="nav-link">Client Portal</a>
            <a href="login.html" class="nav-link active">Admin Login</a>
        </div>
    </nav>

    <div class="container">
        <div class="card" style="max-width: 400px; margin: 60px auto;">
            <h2>🔐 Admin Login</h2>
            <p class="subtitle" style="margin-bottom: 20px;">Enter your credentials to access the dashboard</p>

            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter username">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password">
            </div>

            <button class="btn btn-primary" onclick="login()">Login</button>
            <div id="loginMsg" class="message"></div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
